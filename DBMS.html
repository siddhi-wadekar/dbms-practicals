DELIMITER //

CREATE TRIGGER check_salary
BEFORE INSERT ON Employee
FOR EACH ROW
BEGIN

IF NEW.salary < 10000 THEN

SIGNAL SQLSTATE '45000'
SET MESSAGE_TEXT='Salary must be greater than 10000';

END IF;

END //

DELIMITER ;

DELIMITER //

CREATE PROCEDURE emp_cursor()
BEGIN

DECLARE done INT DEFAULT 0;

DECLARE e_id INT;
DECLARE e_name VARCHAR(50);
DECLARE e_dept VARCHAR(50);
DECLARE e_salary INT;

DECLARE total INT DEFAULT 0;

DECLARE emp_cursor CURSOR FOR
SELECT * FROM Employee;

DECLARE CONTINUE HANDLER FOR NOT FOUND
SET done=1;

OPEN emp_cursor;

read_loop: LOOP

FETCH emp_cursor INTO e_id,e_name,e_dept,e_salary;

IF done=1 THEN
LEAVE read_loop;
END IF;

SELECT e_id,e_name,e_dept,e_salary;

SET total=total+e_salary;

END LOOP;

SELECT total AS Total_Salary;

CLOSE emp_cursor;

END //

DELIMITER ;

CALL emp_cursor();`

        ${sec.title}
      </h2>
      <button class="copy-btn" id="${btnId}" onclick="copyCode(${idx}, '${btnId}')">&#128203; Copy</button>
    </div>
    <div class="code-wrap">
      <pre><code id="code-${idx}">${escapeHtml(sec.code)}</code></pre>
    </div>
  `;

      grid.appendChild(card);
    });

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function copyCode(idx, btnId) {
      const text = sections[idx].code;
      navigator.clipboard.writeText(text).then(() => {
        showToast();
        const btn = document.getElementById(btnId);
        btn.textContent = '✔ Copied';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.innerHTML = '&#128203; Copy';
          btn.classList.remove('copied');
        }, 2000);
      }).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast();
      });
    }

    function showToast() {
      clearTimeout(toastTimer);
      toast.classList.add('show');
      toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
    }
  </script>
</body>

</html>
